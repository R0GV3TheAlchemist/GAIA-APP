name: GAIA Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Build the Python sidecar ──────────────────────────────────────────
  build-sidecar:
    name: Build Python Sidecar (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build gaia-backend.exe
        run: pyinstaller gaia-backend.spec

      - name: Rename & stage sidecar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri\binaries
          Copy-Item dist\gaia-backend.exe `
            src-tauri\binaries\gaia-backend-x86_64-pc-windows-msvc.exe

      - name: Verify sidecar exists
        shell: pwsh
        run: |
          $f = "src-tauri\binaries\gaia-backend-x86_64-pc-windows-msvc.exe"
          if (-not (Test-Path $f)) { throw "Sidecar not found: $f" }
          Write-Host "Sidecar OK: $((Get-Item $f).Length) bytes"

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: gaia-backend-sidecar
          path: src-tauri/binaries/gaia-backend-x86_64-pc-windows-msvc.exe

  # ── 2. Build the Tauri app ───────────────────────────────────────────────
  build-tauri:
    name: Build Tauri App (Windows)
    runs-on: windows-latest
    needs: build-sidecar
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build

      - name: Download sidecar into binaries/
        uses: actions/download-artifact@v4
        with:
          name: gaia-backend-sidecar
          path: src-tauri/binaries

      - name: Verify sidecar present before Rust compile
        shell: pwsh
        run: |
          $f = "src-tauri\binaries\gaia-backend-x86_64-pc-windows-msvc.exe"
          if (-not (Test-Path $f)) { throw "Sidecar missing: $f" }
          Write-Host "Sidecar confirmed: $((Get-Item $f).Length) bytes"

      # All small PNGs in the repo are stubs (<1 KB).
      # Regenerate real PNGs from the SVG source, then build a valid ICO.
      - name: Regenerate icons from SVG
        shell: pwsh
        run: |
          $svg = "src-tauri\icons\gaia-icon.svg"
          $icons = "src-tauri\icons"

          # Use Inkscape (pre-installed) to export real PNGs
          $sizes = @(16, 32, 48, 64, 128, 256)
          foreach ($s in $sizes) {
            inkscape $svg --export-type=png --export-width=$s --export-height=$s `
              --export-filename="$icons\icon-${s}.png"
          }

          # Overwrite stub PNGs Tauri references
          Copy-Item "$icons\icon-32.png"  "$icons\32x32.png"  -Force
          Copy-Item "$icons\icon-128.png" "$icons\128x128.png" -Force
          Copy-Item "$icons\icon-256.png" "$icons\128x128@2x.png" -Force

          # Build a proper multi-resolution ICO from real PNGs
          magick `
            "$icons\icon-16.png" `
            "$icons\icon-32.png" `
            "$icons\icon-48.png" `
            "$icons\icon-64.png" `
            "$icons\icon-128.png" `
            "$icons\icon-256.png" `
            "$icons\icon.ico"

          Write-Host "icon.ico: $((Get-Item "$icons\icon.ico").Length) bytes"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: gaia-v__VERSION__
          releaseName: "GAIA v__VERSION__"
          releaseDraft: true
          prerelease: false
