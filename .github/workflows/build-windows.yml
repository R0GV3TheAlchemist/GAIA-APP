name: 🪟 Windows Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build GAIA Windows
    runs-on: windows-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Rust stable
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # 4. Python 3.11
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 5. Build Python sidecar using existing .spec file
      - name: Build gaia-backend sidecar (PyInstaller)
        run: pyinstaller gaia-backend.spec --clean
        shell: bash

      # 6. Rename sidecar binary for Tauri target triple
      - name: Rename sidecar binary for Tauri
        run: |
          mv src-tauri/binaries/gaia-backend.exe \
             src-tauri/binaries/gaia-backend-x86_64-pc-windows-msvc.exe
        shell: bash

      # 7. npm install
      - name: Install Node dependencies
        run: npm ci

      # 8. Tauri build
      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # 9. Upload artifacts
      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: GAIA-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: GAIA-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
