name: 🚀 Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    name: Release GAIA (Windows)
    runs-on: windows-latest

    steps:
      # 1. Checkout full history so the tag message is available
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Node.js
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Rust stable
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # 4. Python 3.11
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 5. Build Python sidecar — outputs to dist/gaia-backend.exe
      - name: Build gaia-backend sidecar (PyInstaller)
        run: pyinstaller gaia-backend.spec --clean
        shell: bash

      # 6. Stage sidecar binary for Tauri
      - name: Stage sidecar binary for Tauri
        run: |
          mkdir -p src-tauri/binaries
          cp dist/gaia-backend.exe \
             src-tauri/binaries/gaia-backend-x86_64-pc-windows-msvc.exe
        shell: bash

      # 7. npm install
      - name: Install Node dependencies
        run: npm ci

      # 8. Tauri build (signed)
      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # 9. Publish to GitHub Releases
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GAIA ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
